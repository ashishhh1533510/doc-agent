      \ and operations of\n``MutableMapping`` as well as dict's ``copy``. Also\nprovides\
      \ ``lower_items``.\n\nAll keys are expected to be strings. The structure remembers\
      \ the\ncase of the last key to be set, and ``iter(instance)``,\n``keys()``,\
      \ ``items()``, ``iterkeys()``, and ``iteritems()``\nwill contain case-sensitive\
      \ keys. However, querying and contains\ntesting is case insensitive::\n\n  \
      \  cid = CaseInsensitiveDict()\n    cid['Accept'] = 'application/json'\n   \
      \ cid['aCCEPT'] == 'application/json'  # True\n    list(cid) == ['Accept'] \
      \ # True\n\nFor example, ``headers['content-encoding']`` will return the\nvalue\
      \ of a ``'Content-Encoding'`` response header, regardless\nof how the header\
      \ name was originally stored.\n\nIf the constructor, ``.update``, or equality\
      \ comparison\noperations are given keys that have equal ``.lower()``s, the\n\
      behavior is undefined."
