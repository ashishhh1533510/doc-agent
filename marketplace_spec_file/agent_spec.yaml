openapi: "3.0.0"

info:
  title: "Architecture Design Agent Operational API"
  version: "1.0.0"
  description: "Generates repo-specific architecture diagrams — HLD (C4 Combined: Context + Container) and LLD (Class, Sequence, Component, Dependency) — from a GitHub repository or local project path. Returns Mermaid source plus a rendered-image URL, a validation report, an accuracy score, and LLM token-usage metrics."

servers:
  - url: "https://doc-agent-z8ym.onrender.com"

paths:
  /generate/diagram/:
    post:
      summary: "Generate Architecture Diagram"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                project_path:
                  type: string
                  description: "GitHub repository URL or local project path."
                  example: "https://github.com/psf/requests"
                mode:
                  type: string
                  description: "Diagram family: 'hld' for High-Level Design, 'lld' for Low-Level Design."
                  enum: [hld, lld]
                  default: hld
                output_type:
                  type: string
                  description: "HLD view (used when mode=hld)."
                  enum: [combined, context, container]
                  default: combined
                diagram_type:
                  type: string
                  description: "LLD diagram (used when mode=lld)."
                  enum: [class, sequence, component, dependency]
                  default: class
                private_access_token:
                  type: string
                  description: "Optional access token for private repositories."
              required:
                - project_path

      responses:
        "200":
          description: "Successful Response"
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string
                    description: "Primary diagram as Mermaid source text (downloadable as .mmd)."
                  image_url:
                    type: string
                    description: "Rendered image URL (Kroki) for the primary diagram."
                  diagrams:
                    type: array
                    description: "All rendered diagram views; each has content (Mermaid) and image_url."
                    items:
                      type: object
                  output_type:
                    type: string
                  diagram_type:
                    type: string
                  validation:
                    type: object
                  accuracy:
                    type: object
                  arch_context:
                    type: object
                  token_usage:
                    type: object
                  saved_to:
                    type: string
                    nullable: true
