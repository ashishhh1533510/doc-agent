openapi: "3.0.0"

info:
  title: "Architecture Design Agent Operational API"
  version: "1.0.0"
  description: "Generates repo-specific architecture diagrams — HLD (C4 Combined: Context + Container) and LLD (Class, Sequence, Component, Dependency) — from a GitHub repository or local project path. Returns Mermaid source plus a rendered-image URL, a validation report, an accuracy score, and LLM token-usage metrics."

servers:
  # Full endpoint URL: the marketplace proxy dispatches to servers.url directly
  # and does NOT append the path below, so the path must live in the server URL.
  - url: "https://doc-agent-z8ym.onrender.com/generate/diagram/"

paths:
  /generate/diagram/:
    post:
      summary: "Generate Architecture Diagram"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                project_path:
                  type: string
                  description: "GitHub repository URL or local project path."
                  example: "https://github.com/ashishhh1533510/Architecture-Design-Agent"
                diagram_type:
                  type: string
                  description: "Diagram to generate. 'hld' = C4 Combined (Context + Container) High-Level Design; the others are Low-Level Design diagrams. The backend derives HLD vs LLD from this value."
                  enum: [hld, class, sequence, component, dependency]
                  default: hld
                mode:
                  type: string
                  description: "Optional override of the diagram family. Normally derived from diagram_type; set only to force 'hld' or 'lld'."
                  enum: [hld, lld]
                private_access_token:
                  type: string
                  description: "Optional access token for private repositories."
              required:
                - project_path

      responses:
        "200":
          description: "Successful Response"
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: string
                    description: "Primary diagram as Mermaid source text (downloadable as .mmd)."
                  image_url:
                    type: string
                    description: "Rendered image URL (Kroki) for the primary diagram."
                  diagrams:
                    type: array
                    description: "All rendered diagram views; each has content (Mermaid) and image_url."
                    items:
                      type: object
                  output_type:
                    type: string
                  diagram_type:
                    type: string
                  validation:
                    type: object
                  accuracy:
                    type: object
                  arch_context:
                    type: object
                  token_usage:
                    type: object
                  saved_to:
                    type: string
                    nullable: true
