# VAM Enterprise Agent Specification
# Agent: Architecture Design Agent

version: "1.0.0"

servers:
  - url: "https://doc-agent-z8ym.onrender.com/generate/diagram/"
    description: "Architecture Design Agent — HLD (C4 Combined) + LLD (Class/Sequence/Component/Dependency)"

ui_preferences:
  execution:
    mode: synchronous
    loader_style: spinner

  inputs:
    - name: "project_path"
      label: "GitHub Repository URL"
      widget_type: "text"
      placeholder: "https://github.com/ashishhh1533510/Architecture-Design-Agent"
      validation:
        required: true

    # One dropdown drives everything. Option values are sent verbatim as the JSON
    # body value for `diagram_type`; the backend derives HLD vs LLD from the
    # choice ("hld" = C4 Combined HLD; the rest = the matching LLD diagram).
    # HLD has a single view (C4 Combined), so it is one option — no sub-selector.
    - name: "diagram_type"
      label: "Diagram Type"
      widget_type: "dropdown"
      options:
        - "hld"
        - "class"
        - "sequence"
        - "component"
        - "dependency"
      default: "hld"
      validation:
        required: true

    - name: "private_access_token"
      label: "Access Token"
      widget_type: "password"
      placeholder: "Optional token for private repositories"
      validation:
        required: false

  outputs:
    primary_view: "dashboard"

    data_mapping:
      - key: "image_url"
        label: "Architecture Diagram"
        widget: "image"

      - key: "content"
        label: "Mermaid Source (.mmd)"
        widget: "code"

      - key: "output_type"
        label: "HLD View"
        widget: "text"

      - key: "diagram_type"
        label: "LLD Diagram Type"
        widget: "text"

      - key: "accuracy.score"
        label: "Accuracy Score (/100)"
        widget: "text"

      - key: "accuracy.grade"
        label: "Fidelity Grade"
        widget: "text"

      - key: "token_usage.total_tokens"
        label: "Total Tokens"
        widget: "text"

      - key: "token_usage.llm_calls"
        label: "LLM Calls"
        widget: "text"
